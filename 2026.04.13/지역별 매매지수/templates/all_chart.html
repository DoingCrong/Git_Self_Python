{% extends "base.html" %}

{% block title %}전체 그래프{% endblock %}

{% block content %}
<h2>전체 지역 최신월 매매지수 그래프</h2>
<p><strong>{{ latest_month }}</strong> 기준</p>

<div class="chart-box">
    <canvas id="allChart"></canvas>
</div>

<script>
    const labels = {{ labels | tojson }};
    const values = {{ values | tojson }};

    const ctx = document.getElementById("allChart").getContext("2d");

    new Chart(ctx, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "{{ latest_month }} 매매지수",
                data: values,
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: false
                }
            }
        }
    });
</script>
{% endblock %}

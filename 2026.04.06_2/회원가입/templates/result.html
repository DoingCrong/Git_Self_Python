<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 결과</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page-wrap">
        <div class="result-card">
            <h2>회원가입 결과</h2>
            <hr>
            <table>
                <tr>
                    <th>아이디</th>
                    <td>{{ id }}</td>
                </tr>
                <tr>
                    <th>비밀번호</th>
                    <td>{{ password }}</td>
                </tr>
                <tr>
                    <th>연락처</th>
                    <td>{{ phone }}</td>
                </tr>
                <tr>
                    <th>생년월일</th>
                    <td>{{ age }}</td>
                </tr>
                <tr>
                    <th>주소</th>
                    <td>{{ home }}</td>
                </tr>
            </table>
            <hr>
            <p class="welcome-message">{{ id }}님 회원가입을 환영합니다.</p>
        </div>
    </div>
</body>
</html>

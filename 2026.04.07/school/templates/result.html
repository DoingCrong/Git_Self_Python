<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>resultPage</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h2>성적결과</h2>
    <hr>
    <table align="center" border="1">
        <tr>
            <th colspan="8" align="center">성적결과</th>
        </tr>
        <tr>
            <th>번호</th>
            <th>이름</th>
            <th>국어</th>
            <th>영어</th>
            <th>수학</th>
            <th>총점</th>
            <th>평균</th>
            <th>학점</th>
        </tr>

        <!-- 자료가 적으면 일일이 넣었지만 100개면 100개를 넣을 수 없기때문..-->
        <!-- <tr>
            <td>{{name}}</td>
            <td>{{kor}}</td>
            <td>{{eng}}</td>
            <td>{{math}}</td>
            <td>{{total}}</td>
            <td>{{avg}}</td>
            <td>{{grade}}</td>
        </tr> -->
        <!--python에서 table for문 작성하는법 -->
        {% for row in rows %}
        <tr>
            <td>{{row.id}}</td>
            <td>{{row.name}}</td>
            <td>{{row.kor}}</td>
            <td>{{row.eng}}</td>
            <td>{{row.math}}</td>
            <td>{{row.total}}</td>
            <td>{{row.avg}}</td>
            <td>{{row.grade}} </td>
        </tr>
        {% endfor %}
    </table>
    <hr>

    <a href="/">돌아가기</a>
</body>
</html>

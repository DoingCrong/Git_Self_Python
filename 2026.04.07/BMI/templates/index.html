<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI 계산기</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="page-shell">
        <section class="card">
            <p class="eyebrow">Health Check</p>
            <h1>BMI 계산기</h1>
            <p class="intro">이름, 키, 몸무게를 입력하면 BMI 결과를 바로 확인할 수 있습니다.</p>

            <form action="/insert" method="post" class="bmi-form">
                <div class="field">
                    <label for="name">이름</label>
                    <input id="name" type="text" name="name" placeholder="이름을 입력하세요" required>
                </div>

                <div class="field">
                    <label for="tall">키(cm)</label>
                    <input id="tall" type="text" name="tall" placeholder="예: 170" required>
                </div>

                <div class="field">
                    <label for="weight">몸무게(kg)</label>
                    <input id="weight" type="text" name="weight" placeholder="예: 60" required>
                </div>

                <div class="button-row">
                    <input type="submit" value="BMI 계산">
                    <input type="reset" value="다시 입력">
                </div>
            </form>
        </section>
    </main>
</body>
</html>

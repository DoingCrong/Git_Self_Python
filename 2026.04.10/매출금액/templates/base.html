<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}판매 매출 프로그램{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 맑은 고딕, sans-serif;
            margin: 30px;
        }

        h2 {
            color: #333;
        }

        a {
            text-decoration: none;
            margin-right: 15px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #999;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
        }

        .menu {
            margin-bottom: 20px;
        }

        .msg {
            color: blue;
            font-weight: bold;
            margin-top: 10px;
        }

        input, button {
            padding: 8px;
            margin: 5px 0;
        }

        .container {
            width: 900px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>판매 매출 프로그램</h2>

        <div class="menu">
            <a href="{{ url_for('sale_input') }}">입력화면</a>
            <a href="{{ url_for('chart_view') }}">차트보기</a>
        </div>

        <hr>

        {% block content %}
        {% endblock %}
    </div>
</body>
</html>

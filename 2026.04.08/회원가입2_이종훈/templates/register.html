<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page-shell">
        <section class="card form-card">
            <div class="card-header">
                <p class="eyebrow">Member Join</p>
                <h1>회원가입</h1>
                <p class="subtext">필수 정보를 입력하고 계정을 만들어보세요.</p>
            </div>

            <form method="post" class="stack-form">
                <label class="field">
                    <span>아이디</span>
                    <input type="text" name="id" placeholder="아이디를 입력하세요">
                </label>

                <label class="field">
                    <span>비밀번호</span>
                    <input type="password" name="password" placeholder="비밀번호를 입력하세요">
                </label>

                <label class="field">
                    <span>연락처</span>
                    <input type="text" name="phone" placeholder="010-0000-0000">
                </label>

                <label class="field">
                    <span>생년월일</span>
                    <input type="date" name="birth">
                </label>

                <label class="field">
                    <span>주소</span>
                    <input type="text" name="address" placeholder="주소를 입력하세요">
                </label>

                <label class="field">
                    <span>취미</span>
                    <input type="text" name="hobby" placeholder="취미를 입력하세요">
                </label>

                <fieldset class="field">
                    <legend>성별</legend>
                    <label class="choice">
                        <input type="radio" name="gender" value="남자">
                        <span>남자</span>
                    </label>
                    <label class="choice">
                        <input type="radio" name="gender" value="여자">
                        <span>여자</span>
                    </label>
                </fieldset>

                <label class="field">
                    <span>메모</span>
                    <input type="text" name="memo" placeholder="남기고 싶은 내용을 입력하세요">
                </label>

                <div class="button-row">
                    <input class="button primary" type="submit" value="가입하기">
                    <input class="button secondary" type="reset" value="다시입력">
                </div>
            </form>

            <p class="helper-text">
                이미 계정이 있나요?
                <a href="{{ url_for('login') }}">로그인으로 이동</a>
            </p>
        </section>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="center">
    <div class="card">
        <div class="logo">회원가입</div>
        <div class="subtitle">정보를 입력하고 가입하세요</div>

        <form action="/register" method="post">
            <div class="field">
                <label>아이디</label>
                <input type="text" name="id" placeholder="아이디" required>
            </div>
            <div class="field">
                <label>비밀번호</label>
                <input type="password" name="password" placeholder="비밀번호" required>
            </div>
            <div class="field">
                <label>연락처</label>
                <input type="tel" name="phone" placeholder="010-0000-0000">
            </div>
            <div class="field">
                <label>생년월일</label>
                <input type="date" name="birth">
            </div>
            <div class="field">
                <label>주소</label>
                <input type="text" name="address" placeholder="주소 입력">
            </div>
            <div class="field">
                <label>취미</label>
                <input type="text" name="hobby" placeholder="취미">
            </div>
            <div class="field">
                <label>성별</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="남"> 남자</label>
                    <label><input type="radio" name="gender" value="여"> 여자</label>
                </div>
            </div>
            <div class="field">
                <label>비고</label>
                <textarea name="note" placeholder="기타 내용"></textarea>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" type="submit">가입하기</button>
                <button class="btn btn-secondary" type="reset">다시입력</button>
            </div>
        </form>

        <div class="link-row">
            이미 계정이 있으신가요? <a href="/login">로그인</a>
        </div>
    </div>
</div>
</body>
</html>

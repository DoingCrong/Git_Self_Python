<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page-shell">
        <div class="card form-card">
            <div class="hero-badge">Member Join</div>
            <h1>회원가입</h1>
            <p class="subtitle">정보를 입력하고 계정을 만들어보세요.</p>

            <form action="/join" method="post" class="form-grid">
                <div class="field">
                    <label for="id">아이디</label>
                    <input id="id" type="text" name="id" placeholder="아이디를 입력하세요" required>
                </div>

                <div class="field">
                    <label for="password">비밀번호</label>
                    <input id="password" type="password" name="password" placeholder="비밀번호를 입력하세요" required>
                </div>

                <div class="field">
                    <label for="name">이름</label>
                    <input id="name" type="text" name="name" placeholder="이름을 입력하세요" required>
                </div>

                <div class="field">
                    <label for="email">이메일</label>
                    <input id="email" type="email" name="email" placeholder="example@email.com" required>
                </div>

                <div class="field">
                    <label for="phone">연락처</label>
                    <input id="phone" type="text" name="phone" placeholder="010-0000-0000" required>
                </div>

                <div class="field">
                    <label for="birth">생년월일</label>
                    <input id="birth" type="text" name="birth" placeholder="2000-01-01" required>
                </div>

                <div class="field full">
                    <label for="address">주소</label>
                    <input id="address" type="text" name="address" placeholder="주소를 입력하세요">
                </div>

                <div class="field full">
                    <span class="field-label">취미</span>
                    <div class="choice-row">
                        <label class="choice-pill"><input type="text" name="hobby" placeholder="예 : 운동 , 게임"></label>
                    </div>
                </div>

                <div class="field full">
                    <span class="field-label">성별</span>
                    <div class="choice-row">
                        <label class="choice-pill"><input type="radio" name="gender" value="남자" > 남자</label>
                        <label class="choice-pill"><input type="radio" name="gender" value="여자" > 여자</label>
                    </div>
                </div>

                <div class="field full">
                    <label for="memo">메모</label>
                    <textarea id="memo" name="memo" placeholder="추가로 남길 내용을 적어주세요."></textarea>
                </div>

                <div class="form-actions full">
                    <button type="submit" class="btn btn-primary">회원가입 완료</button>
                    <a href="/main" class="btn btn-secondary">메인으로</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
